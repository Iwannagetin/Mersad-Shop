<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #E7CBB3;
      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      font-family: sans-serif;
      padding: 20px;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;

      width: 100%;
      max-width: 500px;
    }

    .main-image {
      width: 100%;
      aspect-ratio: 1 / 1;

      object-fit: cover;

      border-radius: 20px;

      box-shadow: 0 0 25px rgba(255,255,255,0.15);
    }

    .text-image {
      width: 80%;
      max-width: 350px;

      object-fit: contain;
    }

    @media (max-width: 600px) {
      .container {
        gap: 15px;
      }

      .text-image {
        width: 90%;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <img src="logo.jpg" alt="Main Image" class="main-image">

    <img src="text2.jpg" alt="Text Image" class="text-image">

  </div>

</body>
</html>
